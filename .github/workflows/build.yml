name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    # Pushes that only touch tests/docker/** trigger the test-image
    # workflow, which republishes openwrt-test:latest. Letting Build
    # run on that same push races: it pulls the OLD :latest while the
    # new one is still baking. Skip — the next functional commit will
    # exercise the freshly published image.
    #
    # LIMITATION (mixed-push gap): paths-ignore skips a workflow only when
    # EVERY changed file matches. A single commit touching BOTH tests/docker/**
    # AND a functional file still runs Build, which pulls :latest while
    # test-image is mid-rebuild (its concurrency group can't yield —
    # cancel-in-progress: false). The pulled image is never corrupt (GHCR
    # repoints a tag only after all layers push — you get the OLD or NEW
    # complete image, not a torn one), so the worst case is the VM suite running
    # against the PRIOR-Dockerfile harness; the code under test is tar-pushed
    # into the guest at runtime, so the functional change is still exercised.
    # To test against the new harness in the same change, commit Dockerfile edits
    # separately, or re-run Build once test-image has published.
    paths-ignore:
      - 'tests/docker/**'
      - '.github/workflows/test-image.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level: every job is read-only by default. Only the
# publishing `build` job gets contents: write (job-level override below), so the
# PR-facing lint/test/browser-test jobs — including the privileged --device
# /dev/kvm test container running untrusted PR code — cannot write to the repo.
permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # Domain-based path filtering via dorny/paths-filter. A change exercises only
  # the area(s) it touches. Routine pushes to main AND pull_requests are filtered
  # (paths-filter diffs PR-vs-base and push-vs-previous-tip respectively); tag
  # pushes (v*, an explicit release) and workflow_dispatch (the manual recovery
  # button) always run the FULL pipeline. The version-compare gate in pages.yml is
  # self-healing, so a docs-only push that skips `build` causes no feed drift.
  #
  # Five source domains -> four downstream gates (see the Aggregate step):
  #   code   = any code/test change       -> lint, bbolt, build
  #   vm     = whole ucode suite relevant  -> test (QEMU VM)
  #   ui     = UI assets / browser harness -> browser-test
  #   jsunit = node unit + i18n/PO regen   -> js-unit
  changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      code:   ${{ steps.agg.outputs.code }}
      vm:     ${{ steps.agg.outputs.vm }}
      ui:     ${{ steps.agg.outputs.ui }}
      jsunit: ${{ steps.agg.outputs.jsunit }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Tag pushes and manual dispatch short-circuit the filter -> full pipeline.
      - name: Decide run-all (tag / manual dispatch => full pipeline)
        id: decide
        run: |
          set -eu
          run_all=false
          case "${GITHUB_REF}" in refs/tags/*) run_all=true ;; esac
          [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && run_all=true
          echo "run_all=${run_all}" >> "$GITHUB_OUTPUT"
          echo "run_all=${run_all}"

      # Pinned to a full commit SHA (v3.0.3) per this repo's SHA-pin policy for
      # third-party actions. Skipped on tag/dispatch (run_all forces all gates on).
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        if: steps.decide.outputs.run_all != 'true'
        with:
          filters: |
            backend:
              - 'singbox-ui/**'
              - 'tests/backend/**'
              - 'tests/parity/**'
              - 'tests/ucode-stubs/**'
              - 'tests/fixtures/**'
            ui:
              - 'luci-app-singbox-ui/**'
              - 'tests/ui/**'
              - 'tests/browser/**'
              - 'tests/browser-container/**'
            bbolt:
              - 'bbolt-client/**'
            packaging:
              - 'scripts/**'
              - 'install.sh'
              - 'feed/**'
              - '**/Makefile'
              - 'tests/cross/**'
            shared:
              - 'tests/lib/**'
              - 'tests/run*'
              - 'tests/docker/**'
              - '.github/**'

      # Fold run_all + the cross-cutting `shared` domain into the four job gates.
      # The VM runs the WHOLE suite (backend+ui+cross), so everything EXCEPT a
      # pure-bbolt or pure-docs change is relevant to it (UI-source changes are
      # validated by cross ACL/manifest tests that run in the VM). bbolt+build are
      # coupled: build embeds the bbolt artifact, so bbolt must run whenever build
      # does (=`code`); the binaries are source-hash cached, so a hit is seconds.
      - name: Aggregate gates
        id: agg
        env:
          RUN_ALL:   ${{ steps.decide.outputs.run_all }}
          F_BACKEND: ${{ steps.filter.outputs.backend }}
          F_UI:      ${{ steps.filter.outputs.ui }}
          F_BBOLT:   ${{ steps.filter.outputs.bbolt }}
          F_PKG:     ${{ steps.filter.outputs.packaging }}
          F_SHARED:  ${{ steps.filter.outputs.shared }}
        run: |
          set -eu
          on() { [ "$1" = "true" ]; }
          base_on() { on "$RUN_ALL" || on "$F_SHARED"; }
          code=false; vm=false; ui=false; jsunit=false
          if base_on || on "$F_BACKEND" || on "$F_UI" || on "$F_BBOLT" || on "$F_PKG"; then code=true; fi
          if base_on || on "$F_BACKEND" || on "$F_UI" || on "$F_PKG"; then vm=true; fi
          if base_on || on "$F_UI"; then ui=true; fi
          if base_on || on "$F_UI" || on "$F_PKG"; then jsunit=true; fi
          for k in code vm ui jsunit; do
            eval "v=\$$k"
            echo "$k=$v" >> "$GITHUB_OUTPUT"
          done
          echo "resolved: code=$code vm=$vm ui=$ui jsunit=$jsunit (run_all=$RUN_ALL shared=$F_SHARED)"

  lint:
    name: Lint (host)
    runs-on: ubuntu-24.04
    needs: [changes]
    # Any code/test change. Pure-docs pushes/PRs skip the whole pipeline.
    if: ${{ needs.changes.outputs.code == 'true' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: main.js syntax check (host node)
        run: sh tests/cross/test_main_js_syntax.sh

      # build-apk.sh is a host bash build script; its per-arch packaging test
      # needs bash (absent in the OpenWrt qemu guest, where it SKIPs). Run it
      # here on the bash-equipped host so its assertions actually execute in CI.
      - name: build-apk per-arch packaging test (host bash)
        run: sh tests/cross/test_build_apk_per_arch.sh

      # Lint via the official shellcheck image instead of apt-installing the
      # binary on every run (saves the apt-get update/install round-trip and
      # pins a known shellcheck version). The repo is mounted at /mnt — the
      # image's WORKDIR — so .shellcheckrc at the root is honoured and the
      # relative globs resolve. Two invocations: the uci-defaults script must
      # be linted as busybox ash, not bash.
      - name: shellcheck
        # Pin to an explicit shellcheck version rather than the mutable :stable
        # tag — :stable is re-pointed upstream and pulled fresh each run, so the
        # lint behaviour (and the image we execute) could change without a commit.
        run: |
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.10.0 \
            tests/*.sh tests/*/*.sh scripts/*.sh install.sh \
            singbox-ui/root/etc/init.d/singbox-ui
          # uci-defaults runs under busybox ash on OpenWrt, not bash. Lint the
          # WHOLE directory with --shell=ash so bashisms (arrays, [[ ]], $'...')
          # fail at CI rather than silently at first-boot on the router. Globbing
          # the dir (not a hardcoded file list) means a NEW uci-defaults script
          # is linted automatically and this lint-coverage can't drift again
          # (90-singbox-ui-fwmark was previously unlinted by anything).
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.10.0 --shell=ash \
            singbox-ui/root/etc/uci-defaults/*

  js-unit:
    name: JS unit tests (host node)
    runs-on: ubuntu-24.04
    needs: [lint, changes]
    # UI assets OR packaging (scripts/regen-po.sh, po templates) -> node unit
    # tests + i18n/PO coverage + POT freshness.
    if: ${{ needs.changes.outputs.jsunit == 'true' }}
    timeout-minutes: 12
    # The node-gated *_js.sh / json_import tests carry real assertions for the
    # XSS-relevant descriptor_form.js logic, the validators, and the share-link/
    # JSON importer parsers. They SKIP inside the OpenWrt qemu VM (no node in the
    # guest), so without a node-equipped host job their assertions never run in
    # CI. Run them here, pre-merge, on a clean host with node only — ucode is
    # absent, so json_import's ucode-half roundtrip gracefully SKIPs while its
    # node-side import assertions still execute.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Derive the node-gated set PROGRAMMATICALLY instead of hardcoding it —
      # a hardcoded list silently drifts (it once omitted 5 real test files:
      # test_dashboard_js, test_version_gate_js, test_audit_2_4/_8_3/_9_3, which
      # then SKIPped in the VM and never ran anywhere). Any test that gates on
      # `command -v node` or `NODE_BIN` is selected here. test_main_js_syntax.sh
      # also matches but already runs in the lint job; running it twice is
      # harmless. ucode is absent on this host, so the ucode-half of
      # json_import gracefully SKIPs while node-side assertions still execute.
      - name: Run node-gated JS unit tests
        run: |
          set -eu
          found=0
          for t in $(grep -lE 'command -v node|NODE_BIN' tests/*/test_*.sh | sort); do
            echo "==> $t"
            sh "$t"
            found=$((found + 1))
          done
          [ "$found" -gt 0 ] || { echo "FAIL: no node-gated tests matched the glob"; exit 1; }
          echo "Ran $found node-gated test file(s)."

      # i18n guard (pure shell+grep+awk) — runs here on the host, not only in the
      # node-less VM, so the msgid-coverage / untranslated-threshold assertions
      # actually execute pre-merge in CI.
      - name: PO coverage (i18n threshold)
        run: sh tests/cross/test_po_coverage.sh

      # Catch a forgotten `scripts/regen-po.sh` run: if a developer added a new
      # _('...') UI string without regenerating the template, the .pot here will
      # differ from the committed one. xgettext is needed for regen.
      - name: gettext (for regen-po)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gettext

      - name: POT is up to date (regen-po produces no diff)
        run: |
          set -eu
          sh scripts/regen-po.sh
          # The template (.pot) must be byte-identical to what's committed.
          # regen-po pins POT-Creation-Date + sort order, so a clean tree diffs
          # empty. A non-empty diff means a forgotten regen — fail with the diff.
          if ! git diff --quiet -- luci-singbox-ui/po/templates/luci-singbox-ui.pot; then
            echo "FAIL: luci-singbox-ui.pot is stale — run scripts/regen-po.sh and commit."
            git --no-pager diff -- luci-singbox-ui/po/templates/luci-singbox-ui.pot
            exit 1
          fi
          echo "POT is up to date."

  test:
    name: Test suite (OpenWrt VM)
    runs-on: ubuntu-24.04
    needs: [lint, changes]
    # The VM entrypoint runs the WHOLE suite (backend+ui+cross), so it is relevant
    # to every change except a pure-bbolt or pure-docs one (see the changes job).
    if: ${{ needs.changes.outputs.vm == 'true' }}
    # The QEMU-OpenWrt VM job is the one most likely to wedge (bad boot/loadvm).
    # Bound it so a hung guest fails fast instead of idling the runner ~6h.
    timeout-minutes: 25
    # The whole job runs inside the pre-built openwrt-test image. The
    # image carries qemu + the OpenWrt rootfs + a baked memory snapshot.
    # --device /dev/kvm passes the host's KVM into the container so qemu
    # can boot the guest via -loadvm in ~3-5 s. The image is published by
    # .github/workflows/test-image.yml; CI just pulls it. See
    # docs/superpowers/specs/2026-06-09-unified-qemu-test-rig-design.md.
    #
    # Owner is taken from ${{ github.repository_owner }} (lowercased by GHCR's
    # own normalisation) so this matches test-image.yml's published path after a
    # rename or on a fork — a hardcoded owner would 404 on pull. container.image
    # cannot reference a per-step output, but the repository_owner context is
    # allowed here.
    container:
      image: ghcr.io/${{ github.repository_owner }}/luci-singbox/openwrt-test:latest
      options: --device /dev/kvm

    steps:
      - uses: actions/checkout@v6

      - name: Run tests in OpenWrt VM
        env:
          WORK_DIR: ${{ github.workspace }}
        run: /opt/entrypoint.sh

  browser-test:
    name: Browser integration tests
    runs-on: ubuntu-24.04
    # browser-test consumes no artifact or output from the `test` (VM) job; they
    # run on separate runners with no shared state, so it only needs lint (+ the
    # changes filter). `build` below still gates on BOTH test and browser-test, so
    # correctness is unchanged while browser-test runs in parallel with the VM suite.
    needs: [lint, changes]
    # UI assets / browser harness only.
    if: ${{ needs.changes.outputs.ui == 'true' }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      # Third-party actions pinned to full commit SHAs (version in comment) —
      # they run with the repo checked out; a tag-repoint upstream must not be
      # able to change what executes here without a commit to this repo.
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          # Pin an exact version, not the '1.2.x' wildcard: setup-bun v2.0.2
          # passes the version verbatim into the bun.sh download URL, and
          # https://bun.sh/download/1.2.x/... now returns HTTP 400 (the literal
          # "x" is no longer accepted as a version segment). A concrete patch
          # (verified 200) keeps the job deterministic, matching the SHA-pin
          # philosophy above. Bump deliberately when a newer bun is wanted.
          bun-version: '1.2.21'

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      # Cache the Docker image's build layers across runs. test_browser.sh reads
      # BUILDX_CACHE and passes it to `docker buildx build --cache-from/--cache-to
      # type=local`, so this cache actually feeds the build (it used to save an
      # empty dir — nothing wrote to it). A fresh runner has an empty image store,
      # so the build always runs; the layer cache is what makes it fast (~few s on
      # a hit vs the full ~30s apk add on a miss).
      - name: Cache Docker buildx layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: browser-img-${{ hashFiles('tests/browser-container/**') }}
          restore-keys: browser-img-

      # Cache puppeteer's Chrome download (~200MB). Pinned to the
      # puppeteer major in tests/browser/package.json. restore-keys lets a
      # package.json bump warm-start from the prior Chrome download instead of
      # a full ~200MB cold fetch (puppeteer skips re-download when the pinned
      # Chrome revision is already present).
      - name: Cache puppeteer Chrome
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('tests/browser/package.json') }}
          restore-keys: puppeteer-

      - name: Install browser test deps
        working-directory: tests/browser
        run: |
          bun install --frozen-lockfile
          bunx puppeteer browsers install chrome

      - name: Run browser suite
        env:
          # Point test_browser.sh's buildx layer cache at the same path the
          # actions/cache step above restores/saves, so the build feeds and
          # populates the cache.
          BUILDX_CACHE: /tmp/.buildx-cache
        run: bash tests/cross/test_browser.sh

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-diagnostics
          path: |
            /tmp/singbox-ui-browser-*.log
            /tmp/singbox-ui-browser-screenshots/
          retention-days: 7
          if-no-files-found: ignore

  # Builds the 5 static, libc-free bbolt-client-rs binaries (x86_64, aarch64,
  # armv7, mipsel, mips) and runs the golden test suite under qemu-user for each
  # cross arch. The resulting binaries are uploaded as a workflow artifact and
  # consumed by the `build` job via download-artifact, replacing the standalone
  # bbolt-client.yml workflow and the bbolt-latest rolling-release dependency.
  bbolt:
    name: Build bbolt-client (5 arches)
    # Pinned (not floating ubuntu-latest) for reproducibility, matching the
    # rest of the workflow's pinning philosophy (SHA-pinned actions, pinned
    # shellcheck/bun). A cold build cross-compiles 5 arches + runs 5 qemu-user
    # suites, so allow generous headroom; a warm bbolt-bin cache hit is seconds.
    runs-on: ubuntu-24.04
    needs: [changes]
    # Any code/test change. `build` embeds the bbolt artifact, so bbolt must run
    # whenever build does (both gate on `code`). Source-hash cached -> seconds on
    # a hit; only a pure-docs change skips it.
    if: ${{ needs.changes.outputs.code == 'true' }}
    timeout-minutes: 40
    defaults:
      run:
        working-directory: bbolt-client

    steps:
      - uses: actions/checkout@v6

      # Short-circuit the whole expensive path (Rust cross-compile + 5 qemu test
      # suites) when bbolt-client source is unchanged. The 5 output binaries are
      # cached keyed on the source hash; on a hit the build/test steps below are
      # skipped and the cached binaries are uploaded as the artifact verbatim, so
      # a push that doesn't touch bbolt-client/ never rebuilds them. Cold cache =
      # full build (no failure mode). Key lists source-relevant inputs only, so a
      # docs-only edit under bbolt-client/ still hits.
      - name: Restore prebuilt bbolt binaries
        id: bbolt-cache
        uses: actions/cache@v5
        with:
          path: |
            bbolt-client/bbolt-client-rs-x86_64
            bbolt-client/bbolt-client-rs-aarch64
            bbolt-client/bbolt-client-rs-armv7
            bbolt-client/bbolt-client-rs-mipsel
            bbolt-client/bbolt-client-rs-mips
          key: bbolt-bin-${{ runner.os }}-${{ hashFiles('bbolt-client/src/**', 'bbolt-client/build.sh', 'bbolt-client/Cargo.lock', 'bbolt-client/Cargo.toml', 'bbolt-client/rust-toolchain.toml') }}

      # Nightly + rust-src are required for -Z build-std (the toolchain is also
      # pinned in bbolt-client/rust-toolchain.toml). aarch64 cross-links with the
      # bundled rust-lld, so no cross-gcc is needed. llvm-tools provides
      # rust-objcopy, which build.sh uses to strip the MIPS .pdr section.
      - name: Install nightly + rust-src + llvm-tools
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src --component llvm-tools
          rustc +nightly --version

      # Cache Cargo registry, git sources, and the Rust target directory.
      # cache `path:` is repo-root-relative (not affected by working-directory).
      - name: Cache Cargo + build artifacts
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bbolt-client/target
          key: bbolt-${{ runner.os }}-${{ hashFiles('bbolt-client/Cargo.lock', 'bbolt-client/build.sh', 'bbolt-client/rust-toolchain.toml') }}
          # Broad restore-keys warm-starts the cargo/target cache across a
          # toolchain bump. cargo invalidates `target/` by rustc fingerprint, so
          # this is normally fine; on a rare ABI/std change it could leave a
          # confusing incremental state — drop/narrow this if flakiness appears.
          # The shipped BINARIES are gated by the separate exact-match
          # bbolt-bin-* cache (no restore-keys), so a toolchain bump still
          # produces fresh, qemu-verified binaries regardless of this cache.
          restore-keys: bbolt-${{ runner.os }}-

      # qemu-user lets us run cross-compiled binaries in the test steps below.
      - name: Install qemu-user
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Build (all 5 arches)
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: ./build.sh

      - name: Test x86_64 (native)
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: ./test.sh

      - name: Test aarch64 (qemu)
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: RUN="qemu-aarch64 target/aarch64-unknown-linux-gnu/release/bbolt-client-rs" ./test.sh

      - name: Test armv7 (qemu)
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: RUN="qemu-arm target/armv7-unknown-linux-gnueabihf/release/bbolt-client-rs" ./test.sh

      - name: Test mipsel (qemu)
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: RUN="qemu-mipsel target/mipsel-unknown-linux-musl/release/bbolt-client-rs" ./test.sh

      - name: Test mips (qemu)
        if: steps.bbolt-cache.outputs.cache-hit != 'true'
        run: RUN="qemu-mips target/mips-unknown-linux-musl/release/bbolt-client-rs" ./test.sh

      # Upload binaries as a workflow artifact for the `build` job to consume.
      # upload-artifact `path:` is repo-root-relative (not affected by working-directory).
      - name: Upload bbolt binaries
        uses: actions/upload-artifact@v7
        with:
          name: bbolt-binaries
          path: |
            bbolt-client/bbolt-client-rs-x86_64
            bbolt-client/bbolt-client-rs-aarch64
            bbolt-client/bbolt-client-rs-armv7
            bbolt-client/bbolt-client-rs-mipsel
            bbolt-client/bbolt-client-rs-mips
          if-no-files-found: error

  build:
    name: Build OpenWrt packages (apk)
    # Pinned (not floating ubuntu-latest): this job installs apt build-deps and
    # runs the release-publishing path, so an unannounced runner-image bump must
    # not change build behaviour without a commit — same pinning philosophy as
    # the rest of the workflow.
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    # Gate the build (and its publish steps) on the full test suite. The publish
    # steps are event-gated to push/main and tags, so PR builds still validate
    # the package without publishing — but a red lint/js-unit/test/browser-test
    # run now BLOCKS the rolling `latest` release instead of shipping a broken
    # apk to install.sh consumers.
    needs: [changes, lint, js-unit, test, browser-test, bbolt]
    # Runs on any code/test change (`code`); a pure-docs change skips it together
    # with lint+bbolt. When `code` is true, lint AND bbolt also run (both gate on
    # `code`) and provide the binaries this job embeds, so require them success;
    # the area-gated test jobs (test/js-unit/browser-test) may be SKIPPED, so
    # accept anything that is not 'failure'. The publish steps below are further
    # event-gated to push-main / tags, so PR builds validate without publishing.
    if: >-
      ${{ !cancelled()
          && needs.changes.outputs.code == 'true'
          && needs.lint.result == 'success'
          && needs.bbolt.result == 'success'
          && needs.test.result != 'failure'
          && needs.js-unit.result != 'failure'
          && needs.browser-test.result != 'failure' }}
    # Only this job publishes releases, so it is the only one that needs write.
    # Top-level permissions are read-only (see header) — this override is the
    # single place contents: write is granted.
    permissions:
      contents: write

    env:
      # Pin to a tagged OpenWrt 25.x release. SDK_VERSION is the SINGLE source of
      # the version string within this job: it is interpolated into both SDK_URL
      # and the SDK cache key below, so bumping it can't leave the cache key
      # matching a stale extract. (build-apk.sh and the test-image Dockerfile
      # carry their own copies — see CLAUDE.md's multi-place bump note.)
      SDK_VERSION: 25.12.3
      SDK_URL: https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `git rev-list --count HEAD` produces a
          # strictly-monotonic release number. Shallow clones report 1 on
          # every build, which collides with apk v3's world-hash check.
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            zstd fakeroot build-essential wget python3

      # Cache both the downloaded tarball and the extracted SDK (with po2lmo
      # already built). On cache hit the script does no I/O work — straight to
      # assembling the package and calling apk mkpkg.
      - name: Cache OpenWrt SDK
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/luci-singbox-ui/openwrt-sdk
            .build/sdk
          # Fold build-apk.sh's hash into the key: the cache holds the EXTRACTED
          # SDK (po2lmo pre-built, feeds patched). When the script changes how it
          # prepares that SDK, a static key would silently reuse a stale extract.
          # restore-keys lets a script change still warm-start from the prior
          # extract (then the build refreshes it) instead of a cold download.
          # The version segment is interpolated from env.SDK_VERSION (single
          # source) so bumping SDK_URL/SDK_VERSION can't leave the key pinned to
          # a stale version's cache.
          key: openwrt-sdk-${{ env.SDK_VERSION }}-x86-64-v2-${{ hashFiles('scripts/build-apk.sh') }}
          restore-keys: |
            openwrt-sdk-${{ env.SDK_VERSION }}-x86-64-v2-
            openwrt-sdk-${{ env.SDK_VERSION }}-x86-64-

      # apk-mkpkg enforces Alpine-style versions: <X.Y.Z>[-rN]. For tag pushes
      # we use the tag (allowing an explicit -rN suffix); for rolling builds
      # the release number is the commit count so `apk upgrade` always sees a
      # strictly newer package.
      - name: Derive version
        id: version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/v}"
            if [[ "$RAW" == *-r* ]]; then
              VERSION="$RAW"
            else
              VERSION="${RAW}-r1"
            fi
          else
            COUNT="$(git rev-list --count HEAD)"
            VERSION="0.0.0-r${COUNT}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      # Binaries built by the `bbolt` job above — no external release download needed.
      - name: Download bbolt-client binaries
        uses: actions/download-artifact@v7
        with:
          name: bbolt-binaries
          path: .bbolt-bin

      # upload-artifact@v4+ strips the longest common directory prefix, so the 5
      # files uploaded as bbolt-client/bbolt-client-rs-* land at
      # .bbolt-bin/bbolt-client-rs-* (the common bbolt-client/ prefix is removed).
      # This step locates the actual directory robustly and exports it as a step
      # output, protecting against any future change in artifact layout.
      - name: Locate bbolt binaries
        id: bbolt
        run: |
          set -euo pipefail
          dir="$(dirname "$(find .bbolt-bin -name 'bbolt-client-rs-x86_64' | head -1)")"
          [ -n "$dir" ] || { echo "bbolt binaries not found in artifact"; ls -R .bbolt-bin; exit 1; }
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          ls -la "$dir"

      - name: Build apk packages
        # sudo -E so the SDK cache (SDK_CACHE_DIR via $HOME) and ~/.cache
        # paths line up with the cache action above. Required: Ubuntu 24.04
        # disables unprivileged user namespaces by default, so the
        # `unshare -r` branch can't run as the runner user — and the
        # fakeroot fallback was removed because the SDK's `apk` wrapper
        # hijacks LD_PRELOAD and silently produced nobody:nogroup packages
        # (see scripts/build-apk.sh comments). Real root is the reliable
        # path.
        run: sudo -E env BBOLT_BIN_DIR="$PWD/${{ steps.bbolt.outputs.dir }}" bash scripts/build-apk.sh "${{ steps.version.outputs.version }}" "$PWD/dist"

      # build-apk.sh ran under sudo, so the SDK tarball + extracted SDK are
      # root-owned. The actions/cache POST-step saves them as the unprivileged
      # runner user; it works today only because tar leaves world-readable perms.
      # Chown the cache tree back so the save is unambiguous insurance against a
      # silent cache-save failure (which would force a cold SDK download forever).
      - name: Reclaim ownership of SDK cache for save
        if: always()
        run: |
          set -eu
          sudo chown -R "$(id -u):$(id -g)" .build/sdk "$HOME/.cache/luci-singbox-ui" 2>/dev/null || true

      - name: List produced packages
        id: pkg
        run: |
          set -euo pipefail
          ls -la dist/
          {
            echo 'files<<EOF'
            ls -1 dist/*.apk
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: luci-singbox-ui-${{ steps.version.outputs.version }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      # Push to main → rolling pre-release `latest` (recreated each push so the
      # asset always reflects the tip of main). Stage fixed-named (version-less)
      # copies so --clobber can overwrite the SAME asset names each push and the
      # `latest` release never accumulates version-suffixed garbage.
      - name: Stage fixed-named assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # dist/ is root-owned (build-apk.sh runs under sudo).
          # bbolt-client is the ONLY per-arch package now:
          #   bbolt-client_<version>_<exact-arch>.apk
          # <exact-arch> may contain underscores (e.g. mipsel_24kc,
          # arm_cortex-a7_neon-vfpv4), so strip the known prefix+version rather
          # than splitting on the last underscore.
          ls dist/bbolt-client_*.apk >/dev/null 2>&1 || { echo "no per-arch bbolt-client apks in dist/"; exit 1; }
          for f in dist/bbolt-client_*.apk; do
            base="${f##*/}"
            arch="${base#bbolt-client_${VERSION}_}"
            arch="${arch%.apk}"
            sudo cp "$f" "dist/bbolt-client-${arch}.apk"
          done
          # The three noarch packages -> fixed, version-less asset names.
          sudo cp "dist/singbox-ui_${VERSION}.apk"             dist/singbox-ui.apk
          sudo cp "dist/luci-app-singbox-ui_${VERSION}.apk"    dist/luci-app-singbox-ui.apk
          sudo cp "dist/luci-i18n-singbox-ui-ru_${VERSION}.apk" dist/luci-i18n-singbox-ui-ru.apk
          sudo chown "$(id -u):$(id -g)" \
            dist/bbolt-client-*.apk dist/singbox-ui.apk \
            dist/luci-app-singbox-ui.apk dist/luci-i18n-singbox-ui-ru.apk
          ls -1 dist/*.apk

      # Checksums for every published apk. Consumed by the Pages workflow, which
      # downloads the rolling-release assets and runs `sha256sum -c sha256sums.txt`
      # before assembling the signed apk feed (install.sh itself is feed-based now
      # and verifies via the signed index, not this file). Runs AFTER the stable-
      # named assets are staged so the names match what the release serves. Names
      # are basename-only (no dist/ prefix). dist/ is root-owned.
      - name: Generate sha256sums.txt
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          cd dist
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            sha256sum bbolt-client-*.apk singbox-ui.apk luci-app-singbox-ui.apk luci-i18n-singbox-ui-ru.apk | sudo tee sha256sums.txt
          else
            sha256sum bbolt-client_*.apk singbox-ui_*.apk luci-app-singbox-ui_*.apk luci-i18n-singbox-ui-ru_*.apk | sudo tee sha256sums.txt
          fi
          sudo chown "$(id -u):$(id -g)" sha256sums.txt
          cat sha256sums.txt

      - name: Publish rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Update the persistent `latest` release in place via `upload --clobber`
          # instead of delete-then-create. The old pattern left the release/tag
          # deleted in the window between delete and create — if the runner died
          # there, install.sh's asset 404'd until the next push. `upload --clobber`
          # overwrites assets atomically on an already-existing release; we only
          # `create` it the first time (guarded by `release view`), and retarget
          # the tag to the current SHA via `release edit` so the asset reflects
          # the tip of main.
          notes="Auto-built from \`main\` @ \`${GITHUB_SHA::7}\` — dev version \`${{ steps.version.outputs.version }}\`. Replaced on every push to main. Three-package split: \`bbolt-client-<arch>.apk\` (per-arch, e.g. \`bbolt-client-x86_64.apk\`), \`singbox-ui.apk\` (noarch backend), \`luci-app-singbox-ui.apk\` (noarch LuCI UI), \`luci-i18n-singbox-ui-ru.apk\` (noarch RU translation). These feed the signed apk feed (GitHub Pages); end users install via that feed — see install.sh / the Pages landing. \`sha256sums.txt\` covers every published asset."
          if ! gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create latest \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Latest build (${{ steps.version.outputs.version }})" \
              --notes "$notes" \
              --prerelease
          else
            gh release edit latest \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Latest build (${{ steps.version.outputs.version }})" \
              --notes "$notes" \
              --prerelease
          fi
          gh release upload latest \
            dist/bbolt-client-*.apk dist/singbox-ui.apk dist/luci-app-singbox-ui.apk \
            dist/luci-i18n-singbox-ui-ru.apk dist/sha256sums.txt \
            --repo "$GITHUB_REPOSITORY" --clobber

      # Tag push (v*) → permanent, non-prerelease GitHub Release.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        # Pinned to a full commit SHA (v2.4.1) rather than the mutable @v2 tag:
        # this action runs with contents: write and the release-publishing token,
        # and its assets are consumed by an unattended `wget | sh` installer.
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          files: |
            dist/*.apk
            dist/sha256sums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
