name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    # Pushes that only touch tests/docker/** trigger the test-image
    # workflow, which republishes openwrt-test:latest. Letting Build
    # run on that same push races: it pulls the OLD :latest while the
    # new one is still baking. Skip — the next functional commit will
    # exercise the freshly published image.
    paths-ignore:
      - 'tests/docker/**'
      - '.github/workflows/test-image.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required to publish releases on tag/main push

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  lint:
    name: Lint (host)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install host tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: main.js syntax check (host node)
        run: sh tests/test_main_js_syntax.sh

      - name: shellcheck
        run: |
          shellcheck tests/*.sh scripts/*.sh \
            luci-app-singbox-ui/root/etc/init.d/singbox-ui
          # uci-defaults runs under busybox ash on OpenWrt, not bash. Lint
          # it with --shell=ash so bashisms (arrays, [[ ]], $'...') fail at
          # CI rather than silently at first-boot on the router.
          shellcheck --shell=ash \
            luci-app-singbox-ui/root/etc/uci-defaults/99-luci-app-singbox-ui

  test:
    name: Test suite (OpenWrt VM)
    runs-on: ubuntu-24.04
    needs: lint
    # The whole job runs inside the pre-built openwrt-test image. The
    # image carries qemu + the OpenWrt rootfs + a baked memory snapshot.
    # --device /dev/kvm passes the host's KVM into the container so qemu
    # can boot the guest via -loadvm in ~3-5 s. The image is published by
    # .github/workflows/test-image.yml; CI just pulls it. See
    # docs/superpowers/specs/2026-06-09-unified-qemu-test-rig-design.md.
    container:
      image: ghcr.io/janeblower/luci-app-sing-box/openwrt-test:latest
      options: --device /dev/kvm

    steps:
      - uses: actions/checkout@v6

      - name: Run tests in OpenWrt VM
        env:
          WORK_DIR: ${{ github.workspace }}
        run: /opt/entrypoint.sh

  browser-test:
    name: Browser integration tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.x'

      - uses: docker/setup-buildx-action@v3

      # Cache Docker image layers across runs. Keyed on the contents of
      # the browser-container/ source. Cache miss => apk add takes ~30s;
      # cache hit => instant.
      - name: Cache Docker buildx layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: browser-img-${{ hashFiles('tests/browser-container/**') }}
          restore-keys: browser-img-

      # Cache puppeteer's Chrome download (~200MB). Pinned to the
      # puppeteer major in tests/browser/package.json.
      - name: Cache puppeteer Chrome
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('tests/browser/package.json') }}

      - name: Install browser test deps
        working-directory: tests/browser
        run: |
          bun install --frozen-lockfile
          bunx puppeteer browsers install chrome

      - name: Run browser suite
        run: bash tests/test_browser.sh

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-diagnostics
          path: |
            /tmp/singbox-ui-browser-*.log
            /tmp/singbox-ui-browser-screenshots/
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build OpenWrt packages (apk)
    runs-on: ubuntu-latest

    env:
      # Pin to a tagged OpenWrt 25.x release. Packages are LUCI_PKGARCH:=all
      # (noarch), so any apk-capable SDK produces the same artifact.
      SDK_URL: https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `git rev-list --count HEAD` produces a
          # strictly-monotonic release number. Shallow clones report 1 on
          # every build, which collides with apk v3's world-hash check.
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            zstd fakeroot build-essential wget python3

      # Cache both the downloaded tarball and the extracted SDK (with po2lmo
      # already built). On cache hit the script does no I/O work — straight to
      # assembling the package and calling apk mkpkg.
      - name: Cache OpenWrt SDK
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/luci-app-singbox-ui/openwrt-sdk
            .build/sdk
          key: openwrt-sdk-25.12.3-x86-64-v1

      # apk-mkpkg enforces Alpine-style versions: <X.Y.Z>[-rN]. For tag pushes
      # we use the tag (allowing an explicit -rN suffix); for rolling builds
      # the release number is the commit count so `apk upgrade` always sees a
      # strictly newer package.
      - name: Derive version
        id: version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/v}"
            if [[ "$RAW" == *-r* ]]; then
              VERSION="$RAW"
            else
              VERSION="${RAW}-r1"
            fi
          else
            COUNT="$(git rev-list --count HEAD)"
            VERSION="0.0.0-r${COUNT}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Build apk packages
        # sudo -E so the SDK cache (SDK_CACHE_DIR via $HOME) and ~/.cache
        # paths line up with the cache action above. Required: Ubuntu 24.04
        # disables unprivileged user namespaces by default, so the
        # `unshare -r` branch can't run as the runner user — and the
        # fakeroot fallback was removed because the SDK's `apk` wrapper
        # hijacks LD_PRELOAD and silently produced nobody:nogroup packages
        # (see scripts/build-apk.sh comments). Real root is the reliable
        # path.
        run: sudo -E bash scripts/build-apk.sh "${{ steps.version.outputs.version }}" "$PWD/dist"

      - name: List produced packages
        id: pkg
        run: |
          set -euo pipefail
          ls -la dist/
          {
            echo 'files<<EOF'
            ls -1 dist/*.apk
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: luci-app-singbox-ui-${{ steps.version.outputs.version }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      # Push to main → rolling pre-release `latest` (recreated each push so the
      # asset always reflects the tip of main).
      - name: Stage stable-named apk
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          src=$(ls -1 dist/*.apk | head -1)
          cp "$src" "dist/luci-app-singbox-ui.apk"
          ls -1 dist/*.apk

      - name: Publish rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete latest --cleanup-tag --yes \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          gh release create latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest build (${{ steps.version.outputs.version }})" \
            --notes "Auto-built from \`main\` @ \`${GITHUB_SHA::7}\` — dev version \`${{ steps.version.outputs.version }}\`. This pre-release is replaced on every push to main. \`luci-app-singbox-ui.apk\` is the stable-named asset used by install.sh." \
            --prerelease \
            dist/luci-app-singbox-ui.apk dist/*.apk

      # Tag push (v*) → permanent, non-prerelease GitHub Release.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
