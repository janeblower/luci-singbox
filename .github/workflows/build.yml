name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required to publish releases on tag/main push

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: Local test suite
    runs-on: ubuntu-latest
    env:
      SDK_URL: https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - uses: actions/checkout@v4

      - name: Install host tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            shellcheck jq nftables zstd wget

      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        with:
          path: ~/.cache/luci-app-singbox-ui/openwrt-sdk
          key: openwrt-sdk-25.12.3-x86-64-v1

      - name: Extract ucode + modules from SDK
        id: ucode
        run: |
          set -euo pipefail
          cache="$HOME/.cache/luci-app-singbox-ui/openwrt-sdk"
          mkdir -p "$cache"
          tarball="$cache/$(basename "$SDK_URL")"
          if [ ! -f "$tarball" ]; then
            wget -q -O "$tarball.part" "$SDK_URL"
            mv "$tarball.part" "$tarball"
          fi
          sdk="$PWD/.ci-sdk"
          mkdir -p "$sdk"
          tar --zstd -xf "$tarball" -C "$sdk" --strip-components=1
          # Resolve ucode binary + .so modules out of the SDK staging tree.
          ucode_bin="$(find "$sdk/staging_dir" -name ucode -type f -perm -u+x | head -n1)"
          ucode_lib="$(find "$sdk/staging_dir" -name 'fs.so' -path '*/ucode/*' -print -quit | xargs -r dirname)"
          [ -x "$ucode_bin" ] || { echo "ucode binary not found in SDK"; exit 1; }
          [ -d "$ucode_lib" ] || { echo "ucode lib dir not found in SDK"; exit 1; }
          echo "UCODE_BIN=$ucode_bin" >>"$GITHUB_ENV"
          echo "UCODE_LIB_DIR=$ucode_lib" >>"$GITHUB_ENV"
          echo "Using ucode: $ucode_bin"
          echo "Using ucode lib dir: $ucode_lib"

      - name: Run tests/run.sh
        run: sh tests/run.sh

      - name: shellcheck
        run: |
          shellcheck tests/*.sh scripts/*.sh \
            luci-app-singbox-ui/root/etc/init.d/singbox-ui \
            luci-app-singbox-ui/root/etc/uci-defaults/99-luci-app-singbox-ui

  build:
    name: Build OpenWrt packages (apk)
    runs-on: ubuntu-latest

    env:
      # Pin to a tagged OpenWrt 25.x release. Packages are LUCI_PKGARCH:=all
      # (noarch), so any apk-capable SDK produces the same artifact.
      SDK_URL: https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git rev-list --count HEAD` produces a
          # strictly-monotonic release number. Shallow clones report 1 on
          # every build, which collides with apk v3's world-hash check.
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            zstd fakeroot build-essential wget python3

      # Cache both the downloaded tarball and the extracted SDK (with po2lmo
      # already built). On cache hit the script does no I/O work — straight to
      # assembling the package and calling apk mkpkg.
      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/luci-app-singbox-ui/openwrt-sdk
            .build/sdk
          key: openwrt-sdk-25.12.3-x86-64-v1

      # apk-mkpkg enforces Alpine-style versions: <X.Y.Z>[-rN]. For tag pushes
      # we use the tag (allowing an explicit -rN suffix); for rolling builds
      # the release number is the commit count so `apk upgrade` always sees a
      # strictly newer package.
      - name: Derive version
        id: version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/v}"
            if [[ "$RAW" == *-r* ]]; then
              VERSION="$RAW"
            else
              VERSION="${RAW}-r1"
            fi
          else
            COUNT="$(git rev-list --count HEAD)"
            VERSION="0.0.0-r${COUNT}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Build apk packages
        run: bash scripts/build-apk.sh "${{ steps.version.outputs.version }}" "$PWD/dist"

      - name: List produced packages
        id: pkg
        run: |
          set -euo pipefail
          ls -la dist/
          {
            echo 'files<<EOF'
            ls -1 dist/*.apk
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-ui-${{ steps.version.outputs.version }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      # Push to main → rolling pre-release `latest` (recreated each push so the
      # asset always reflects the tip of main).
      - name: Publish rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete latest --cleanup-tag --yes \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          gh release create latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest build" \
            --notes "Auto-built from \`main\` @ \`${GITHUB_SHA::7}\`. This pre-release is replaced on every push to main." \
            --prerelease \
            dist/*.apk

      # Tag push (v*) → permanent, non-prerelease GitHub Release.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
