name: bbolt-client

# Builds the standalone bbolt-client-rs reader as static, libc-free binaries for
# OpenWrt on x86_64, aarch64, armv7, mipsel and mips. Binary only — no apk
# packaging (yet).
on:
  push:
    branches: [main]
    paths:
      - 'bbolt-client/**'
      - '.github/workflows/bbolt-client.yml'
  pull_request:
    branches: [main]
    paths:
      - 'bbolt-client/**'
      - '.github/workflows/bbolt-client.yml'
  workflow_dispatch:

# Release publishing (the rolling bbolt-latest tag) needs write; the rpcd
# bbolt_install handler downloads the attached assets from
# /releases/download/bbolt-latest.
permissions:
  contents: write

concurrency:
  group: bbolt-client-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: bbolt-client

jobs:
  build:
    name: static 5-arch (no libc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Nightly + rust-src are required for -Z build-std (the toolchain is also
      # pinned in bbolt-client/rust-toolchain.toml). aarch64 cross-links with the
      # bundled rust-lld, so no cross-gcc is needed. llvm-tools provides
      # rust-objcopy, which build.sh uses to strip the MIPS .pdr section.
      - name: Install nightly + rust-src + llvm-tools
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src --component llvm-tools
          rustc +nightly --version

      # qemu-aarch64 lets us run the cross-built aarch64 binary in the test step.
      - name: Install qemu-user
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Build (all 5 arches)
        run: ./build.sh

      - name: Test x86_64 (native)
        run: ./test.sh

      - name: Test aarch64 (qemu)
        run: RUN="qemu-aarch64 target/aarch64-unknown-linux-gnu/release/bbolt-client-rs" ./test.sh

      - name: Test armv7 (qemu)
        run: RUN="qemu-arm target/armv7-unknown-linux-gnueabihf/release/bbolt-client-rs" ./test.sh

      - name: Test mipsel (qemu)
        run: RUN="qemu-mipsel target/mipsel-unknown-linux-musl/release/bbolt-client-rs" ./test.sh

      - name: Test mips (qemu)
        run: RUN="qemu-mips target/mips-unknown-linux-musl/release/bbolt-client-rs" ./test.sh

      - name: Upload binaries (PR inspection)
        uses: actions/upload-artifact@v7
        with:
          name: bbolt-client-rs
          path: |
            bbolt-client/bbolt-client-rs-x86_64
            bbolt-client/bbolt-client-rs-aarch64
            bbolt-client/bbolt-client-rs-armv7
            bbolt-client/bbolt-client-rs-mipsel
            bbolt-client/bbolt-client-rs-mips
          if-no-files-found: error

      # On push to main: recreate a rolling `bbolt-latest` prerelease with all 5
      # binaries + checksums. bbolt_install (rpcd) and install.sh fetch from
      # /releases/download/bbolt-latest/<asset> — a fixed tag, not the fragile
      # /releases/latest (which picks the newest non-prerelease across all tags).
      - name: Generate checksums
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sha256sum bbolt-client-rs-x86_64 bbolt-client-rs-aarch64 bbolt-client-rs-armv7 bbolt-client-rs-mipsel bbolt-client-rs-mips > sha256sums.txt

      - name: Publish rolling bbolt-latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete bbolt-latest --cleanup-tag --yes \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create bbolt-latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "bbolt-client (latest)" \
            --notes "Static no-libc bbolt-client for OpenWrt (x86_64/aarch64/armv7/mipsel/mips). Auto-built from \`main\` @ \`${GITHUB_SHA::7}\`; replaced on every push to main." \
            --prerelease \
            bbolt-client-rs-x86_64 bbolt-client-rs-aarch64 bbolt-client-rs-armv7 \
            bbolt-client-rs-mipsel bbolt-client-rs-mips sha256sums.txt
