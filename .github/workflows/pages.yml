name: Pages

# Rebuild the feed after every successful Build on main (so it tracks the rolling
# `latest` release), or on demand. Build.yml is the workflow named "Build".
on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# The feed tree is committed to the `gh-pages` branch (awg-openwrt model); the
# package files live there, not as a transient Pages artifact. GitHub Pages is
# configured to serve from that branch and runs its own Jekyll build.
permissions:
  contents: write

# Never push two feed deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & publish apk feed to gh-pages
    runs-on: ubuntu-24.04
    # workflow_run fires on completion regardless of result — gate on success.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      # Same SDK as scripts/build-apk.sh — we only need its host `apk` tool.
      SDK_URL: https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Rebuild the feed only when the version published in the rolling `latest`
      # release differs from the one already committed to gh-pages. This is the
      # actual invariant we care about (gh-pages must mirror the release), and it
      # is self-healing: the next successful Build reconciles any drift no matter
      # which commit touched what.
      #
      # Why NOT a path-diff of the tip commit (the previous approach): the package
      # version is `0.0.0-r<rev-list --count>`, so it bumps on EVERY commit —
      # docs/tests included — which means packages.adb is never "identical" on a
      # docs-only push, and the path-diff premise is false. Worse, the tip-commit
      # diff is blind to (a) batched pushes whose tip is a docs/test commit while
      # feed-relevant commits sit below it, and (b) feed-relevant commits whose
      # own Build failed (Pages never ran). Both silently froze gh-pages behind
      # the release until a manual workflow_dispatch. Version-compare fixes both.
      - name: Decide whether the feed needs rebuilding
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch -> always deploy"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Version published in the rolling release — build.yml titles it
          # "Latest build (<version>)" (version == 0.0.0-r<count> on main).
          REL="$(gh release view latest --repo "$GITHUB_REPOSITORY" --json name -q .name 2>/dev/null || true)"
          NEW="$(printf '%s' "$REL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+' | head -n1 || true)"
          if [ -z "$NEW" ]; then
            echo "could not read latest-release version (name='$REL') -> fail-open, deploy"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Version already on gh-pages — embedded in the apk filenames. After the
          # three-package split the UI package (luci-app-singbox-ui-<version>.apk)
          # is always present in every arch dir. Absent branch / no apk -> empty.
          CUR="$(gh api "repos/$GITHUB_REPOSITORY/git/trees/gh-pages?recursive=1" -q '.tree[].path' 2>/dev/null \
                  | grep -oE 'luci-app-singbox-ui-[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+\.apk' \
                  | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+' | head -n1 || true)"
          echo "latest-release: $NEW ; gh-pages: ${CUR:-<none>}"
          if [ "$NEW" = "$CUR" ]; then
            echo "gh-pages already at $NEW -> skip deploy" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          else
            echo "version drift (${CUR:-<none>} -> $NEW) -> deploy" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install zstd
        if: steps.gate.outputs.relevant == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zstd

      - name: Cache OpenWrt SDK tarball
        if: steps.gate.outputs.relevant == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/luci-singbox-ui/openwrt-sdk
          key: pages-sdk-25.12.3-x86-64

      - name: Extract apk host tool from SDK
        if: steps.gate.outputs.relevant == 'true'
        id: sdk
        run: |
          set -euo pipefail
          cache="$HOME/.cache/luci-singbox-ui/openwrt-sdk"
          mkdir -p "$cache"
          tb="$cache/$(basename "$SDK_URL")"
          if [ ! -f "$tb" ]; then
            wget -qO "$tb.part" "$SDK_URL"
            mv -f "$tb.part" "$tb"
          fi
          sdkdir="$RUNNER_TEMP/sdk"
          mkdir -p "$sdkdir"
          tar --zstd -xf "$tb" -C "$sdkdir"
          root="$(find "$sdkdir" -mindepth 1 -maxdepth 1 -type d | head -n1)"
          apk="$root/staging_dir/host/bin/apk"
          [ -x "$apk" ] || { echo "apk host tool not found at $apk" >&2; exit 1; }
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: Download latest release packages
        if: steps.gate.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download latest --repo "$GITHUB_REPOSITORY" \
            --pattern '*.apk' --pattern 'sha256sums.txt' --dir dist
          ( cd dist && sha256sum -c sha256sums.txt )

      - name: Write signing key
        if: steps.gate.outputs.relevant == 'true'
        env:
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$APK_SIGN_KEY" > "$RUNNER_TEMP/keys/luci-singbox.pem"
          chmod 600 "$RUNNER_TEMP/keys/luci-singbox.pem"

      - name: Build feed tree
        if: steps.gate.outputs.relevant == 'true'
        env:
          APK_BIN: ${{ steps.sdk.outputs.apk }}
          FEED_SIGN_KEY: ${{ runner.temp }}/keys/luci-singbox.pem
          PAGES_URL: https://janeblower.github.io/luci-singbox
          RELEASE_REPO: ${{ github.repository }}
        run: sh scripts/build-feed.sh 25.12 dist public

      # Commit the built tree to gh-pages (force-replace; we regenerate the whole
      # feed every run). GitHub Pages serves from this branch and Jekyll-builds
      # the .md files with the midnight theme. GITHUB_TOKEN + contents:write is
      # enough for a same-repo push.
      - name: Publish feed to gh-pages branch
        if: steps.gate.outputs.relevant == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages
          # Keep Jekyll ON: the midnight theme renders our _config.yml + index.md.
          # Without this peaceiris drops a .nojekyll file and Pages serves raw .md.
          enable_jekyll: true
          commit_message: "deploy feed: ${{ github.event.workflow_run.head_sha || github.sha }}"
