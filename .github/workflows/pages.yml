name: Pages

# Rebuild the feed after every successful Build on main (so it tracks the rolling
# `latest` release), or on demand. Build.yml is the workflow named "Build".
on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# The feed tree is committed to the `gh-pages` branch (awg-openwrt model); the
# package files live there, not as a transient Pages artifact. GitHub Pages is
# configured to serve from that branch and runs its own Jekyll build.
permissions:
  contents: write

# Never push two feed deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & publish apk feed to gh-pages
    runs-on: ubuntu-24.04
    # workflow_run fires on completion regardless of result — gate on success.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      # Same SDK as scripts/build-apk.sh — we only need its host `apk` tool.
      SDK_URL: https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Rebuild the feed only when the SET of per-package versions published in the
      # rolling `latest` release differs from the set already committed to gh-pages.
      # This is the invariant we care about (gh-pages must mirror the release) and
      # it is self-healing: the next successful Build reconciles any drift.
      #
      # Why a version SET, not a single version: packages are now versioned
      # per-package (build.yml emits 0.1.0-r<N> per package, <N> = commits touching
      # that package's paths). A single global version no longer answers "did any
      # package change" — a backend-only push leaves the UI version untouched yet
      # still needs the changed backend apk republished. So build.yml publishes a
      # `versions.txt` manifest (one `<name> <version>` line per package) as a
      # release asset AND into the feed root; we compare the two. Versions are
      # deterministic (they move only when content moves), so this is a stable
      # skip/deploy signal — unlike an apk byte-hash (mkpkg embeds timestamps).
      #
      # Why a manifest and not a tip-commit path-diff (an even older approach): the
      # diff was blind to batched pushes (feed-relevant commits below a docs tip)
      # and to feed-relevant commits whose own Build failed. The manifest compare
      # handles both — it reflects what was actually published, not what the tip
      # touched.
      - name: Decide whether the feed needs rebuilding
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch -> always deploy"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Per-package version manifest published with the rolling release.
          NEW="$(gh release download latest --repo "$GITHUB_REPOSITORY" \
                   --pattern versions.txt --output - 2>/dev/null || true)"
          if [ -z "$NEW" ]; then
            echo "could not read release versions.txt -> fail-open, deploy"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # The copy build-feed.sh stored at the gh-pages feed root last deploy.
          # Absent branch / first deploy / pre-manifest tree -> empty -> deploy.
          CUR="$(gh api "repos/$GITHUB_REPOSITORY/contents/versions.txt?ref=gh-pages" \
                   -H 'Accept: application/vnd.github.raw' 2>/dev/null || true)"
          echo "release versions.txt:"; printf '%s\n' "$NEW"
          echo "gh-pages versions.txt:"; printf '%s\n' "${CUR:-<none>}"
          if [ -n "$CUR" ] && [ "$NEW" = "$CUR" ]; then
            echo "all package versions already on gh-pages -> skip deploy" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          else
            echo "package version set changed -> deploy" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install zstd
        if: steps.gate.outputs.relevant == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zstd

      - name: Cache OpenWrt SDK tarball
        if: steps.gate.outputs.relevant == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/luci-singbox-ui/openwrt-sdk
          key: pages-sdk-25.12.3-x86-64

      - name: Extract apk host tool from SDK
        if: steps.gate.outputs.relevant == 'true'
        id: sdk
        run: |
          set -euo pipefail
          cache="$HOME/.cache/luci-singbox-ui/openwrt-sdk"
          mkdir -p "$cache"
          tb="$cache/$(basename "$SDK_URL")"
          if [ ! -f "$tb" ]; then
            wget -qO "$tb.part" "$SDK_URL"
            mv -f "$tb.part" "$tb"
          fi
          sdkdir="$RUNNER_TEMP/sdk"
          mkdir -p "$sdkdir"
          tar --zstd -xf "$tb" -C "$sdkdir"
          root="$(find "$sdkdir" -mindepth 1 -maxdepth 1 -type d | head -n1)"
          apk="$root/staging_dir/host/bin/apk"
          [ -x "$apk" ] || { echo "apk host tool not found at $apk" >&2; exit 1; }
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: Download latest release packages
        if: steps.gate.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # versions.txt too: build-feed.sh copies it into the feed root so the
          # NEXT Pages run can compare per-package versions (the redeploy gate).
          gh release download latest --repo "$GITHUB_REPOSITORY" \
            --pattern '*.apk' --pattern 'sha256sums.txt' --pattern 'versions.txt' --dir dist
          ( cd dist && sha256sum -c sha256sums.txt )

      - name: Write signing key
        if: steps.gate.outputs.relevant == 'true'
        env:
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$APK_SIGN_KEY" > "$RUNNER_TEMP/keys/luci-singbox.pem"
          chmod 600 "$RUNNER_TEMP/keys/luci-singbox.pem"

      - name: Build feed tree
        if: steps.gate.outputs.relevant == 'true'
        env:
          APK_BIN: ${{ steps.sdk.outputs.apk }}
          FEED_SIGN_KEY: ${{ runner.temp }}/keys/luci-singbox.pem
          PAGES_URL: https://janeblower.github.io/luci-singbox
          RELEASE_REPO: ${{ github.repository }}
        run: sh scripts/build-feed.sh 25.12 dist public

      # Publish the built tree to gh-pages via scripts/publish-feed.sh (a manual
      # git merge), NOT peaceiris/actions-gh-pages. peaceiris keep_files:true was
      # required to coexist with the sibling sing-box-extended core feeds
      # (<ver>/<arch>/sing-box/, published by sing-box-extended.yml) — but
      # keep_files NEVER deletes, so every past package version's .apk piled up in
      # gh-pages forever (packages.adb/index.md overwrite by name, but each
      # release is a new <name>-0.0.0-r<count>.apk filename). publish-feed.sh
      # wipes only the <ver>/<arch>/luci-singbox/ dirs this feed owns before
      # overlaying the new tree, so old versions vanish while the sing-box/
      # subtree is preserved — same coexistence, no stale-apk accumulation.
      #
      # No .nojekyll is written, so GitHub Pages keeps Jekyll on (the midnight
      # theme renders _config.yml + index.md). GITHUB_TOKEN + contents:write is
      # enough for the same-repo push.
      - name: Publish feed to gh-pages branch
        if: steps.gate.outputs.relevant == 'true'
        env:
          FEED_GIT_REMOTE: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          FEED_COMMIT_MSG: "deploy feed: ${{ github.event.workflow_run.head_sha || github.sha }}"
        run: sh scripts/publish-feed.sh public
