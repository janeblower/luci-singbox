name: Test image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tests/docker/**'
      - '.github/workflows/test-image.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: test-image
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build openwrt-test image
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Ensure /dev/kvm
        run: |
          sudo chmod 0666 /dev/kvm
          ls -la /dev/kvm

      # docker/* actions pinned to full commit SHAs (version in comment). This
      # workflow pushes the openwrt-test image every CI run pulls, so a
      # tag-repoint upstream must not be able to alter the build/push without a
      # commit here.
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          buildkitd-flags: --allow-insecure-entitlement security.insecure

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER}/luci-singbox/openwrt-test"
          SHA="${GITHUB_SHA::12}"
          {
            echo "tags<<EOF"
            echo "${REPO}:openwrt-25.12.3-${SHA}"
            echo "${REPO}:openwrt-25.12.3"
            echo "${REPO}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "primary=${REPO}:openwrt-25.12.3-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: tests/docker
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          allow: security.insecure
          provenance: false

      - name: Smoke-run the published image
        run: |
          set -e
          PRIMARY="${{ steps.tags.outputs.primary }}"
          echo "==> pulling ${PRIMARY}"
          docker pull "$PRIMARY"
          echo "==> running entrypoint against the repo (5 min cap)"
          timeout 300 docker run --rm --device /dev/kvm \
            -v "$PWD:/work" "$PRIMARY" || {
              # Snapshot $? FIRST — inside the || block it is reassigned by each
              # subsequent command, so echoing "$?" directly would report the
              # wrong code (e.g. lose timeout's 124).
              rc=$?
              echo "smoke run failed (exit $rc). Image is still pushed."
              echo "Check entrypoint output above; fix and re-dispatch."
              exit 1
            }
