# Minimal LuCI uhttpd config for the test container.
# Bind 0.0.0.0:80 so the Docker port mapping works.
config uhttpd 'main'
    list listen_http  '0.0.0.0:80'
    option home       '/www'
    option cgi_prefix '/cgi-bin'
    option script_timeout   '60'
    option network_timeout  '30'
    # No HTTPS — tests target plaintext over loopback.
