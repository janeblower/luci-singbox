# Build the smallest static, libc-free binary. Because it links NO libc and makes
# raw syscalls, the resulting static ELF runs on any linux/amd64 host (glibc or
# musl/OpenWrt) — the target triple only decides which crt/std Rust would default
# to, and we use none of it.
[build]
target = "x86_64-unknown-linux-gnu"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "relocation-model=static",
  "-C", "link-arg=-nostdlib",
  "-C", "link-arg=-static",
  "-C", "link-arg=-no-pie",
]

# aarch64 cross: link with the bundled rust-lld (no cross-gcc / no libc needed).
[target.aarch64-unknown-linux-gnu]
linker = "rust-lld"
rustflags = [
  "-C", "relocation-model=static",
  "-C", "linker-flavor=ld.lld",
  "-C", "link-arg=-static",
  "-C", "link-arg=--no-dynamic-linker",
]

# armv7 cross (32-bit ARM EABI hardfloat baseline; we use no float, so the VFP
# ABI flag is irrelevant for a static -nostdlib ELF). Links with rust-lld.
[target.armv7-unknown-linux-gnueabihf]
linker = "rust-lld"
rustflags = [
  "-C", "relocation-model=static",
  "-C", "linker-flavor=ld.lld",
  "-C", "link-arg=-static",
  "-C", "link-arg=--no-dynamic-linker",
]

# mips/mipsel (MIPS32r2 o32, soft-float — mips_24kc has no FPU). tier-3 targets;
# we already build std via -Z build-std=core. Static, non-PIC so _start needs no $gp.
[target.mipsel-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
  "-C", "relocation-model=static",
  "-C", "target-feature=+soft-float",
  "-C", "linker-flavor=ld.lld",
  "-C", "link-arg=-static",
  "-C", "link-arg=--no-dynamic-linker",
  "-C", "link-arg=--entry=_start",   # lld defaults this target's entry to __start
]
[target.mips-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
  "-C", "relocation-model=static",
  "-C", "target-feature=+soft-float",
  "-C", "linker-flavor=ld.lld",
  "-C", "link-arg=-static",
  "-C", "link-arg=--no-dynamic-linker",
  "-C", "link-arg=--entry=_start",   # lld defaults this target's entry to __start
]
